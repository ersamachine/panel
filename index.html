<!DOCTYPE html><html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f8f7fa"><title>ERSA YГ¶netici Paneli</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F7FA;--card:#FFFFFF;--card2:#F8F7FA;--red:#FF3131;--red-soft:rgba(255,49,49,.12);--gold:#FF9F43;--green:#28C76F;--blue:#3B82F6;--purple:#FF3131;--muted:#ACAAB1;--line:#E6E6E8;--ink:#6D6B77;--head:#444050;--shadow:0 3px 12px 0 rgba(47,43,61,.14);--shadow-sm:0 2px 8px 0 rgba(47,43,61,.12);}
[data-theme="dark"]{--bg:#25293C;--card:#2F3349;--card2:#363B54;--red:#FF3131;--red-soft:rgba(255,49,49,.2);--gold:#FF9F43;--green:#28C76F;--blue:#5A9CFF;--purple:#FF6B6B;--muted:#76778E;--line:#44485E;--ink:#ACABC1;--head:#CFCDE4;--shadow:0 3px 12px 0 rgba(19,17,32,.42);--shadow-sm:0 2px 8px 0 rgba(19,17,32,.38);}
body,.side,.topbar,.box,.kpi,.row,.modal,.field,.search,.sel,.iconbtn,.cell,.ni,.tsearch,.fx{transition:background .25s,color .2s,border-color .2s;}
.grp{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1.4px;padding:13px 11px 5px;text-transform:uppercase;opacity:.7;}
.ki{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tsearch{flex:1;max-width:340px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:13px;}
.tsearch:focus-within{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.tsearch input{border:none;background:none;outline:none;color:var(--ink);font-size:13px;flex:1;min-width:0;}
.fx{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;color:var(--head);white-space:nowrap;}
.tools{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.grid2{display:grid;grid-template-columns:1fr 1.3fr;gap:18px;align-items:start;}
.oz2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cald{font-size:9.5px;font-weight:800;color:var(--muted);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.5px;}
.cell{min-height:62px;border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-size:12px;color:var(--ink);position:relative;background:var(--card);}
.cell.mut{opacity:.35;}.cell.today{border-color:var(--red);background:var(--red-soft);font-weight:800;}
.cdue{position:absolute;bottom:5px;left:6px;right:6px;font-size:8.5px;font-weight:800;border-radius:5px;padding:2px 4px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lgd{display:flex;flex-direction:column;gap:9px;flex:1;}.lgd .li{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink);}.lgd .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.lpath{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 1.3s cubic-bezier(.2,.8,.2,1) forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.view{animation:vap .35s cubic-bezier(.2,.8,.2,1);}
@keyframes vap{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
@keyframes k_spin{to{transform:rotate(360deg)}}
@keyframes k_bob{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-2.5px) rotate(2.5deg)}}
@keyframes k_pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
@keyframes k_drive{0%,100%{transform:translateX(-1.8px)}50%{transform:translateX(1.8px)}}
@keyframes k_drop{0%,55%{transform:translateY(-3.5px)}74%{transform:translateY(0)}87%{transform:translateY(-1.6px)}100%{transform:translateY(0)}}
@keyframes k_wig{0%,100%{transform:rotate(-13deg)}50%{transform:rotate(13deg)}}
@keyframes k_stamp{0%,100%{transform:translateY(-2px) scale(.95)}50%{transform:translateY(0) scale(1)}}
.kic{transform-origin:center;display:block}
.barG{height:0;transition:height .9s cubic-bezier(.2,.8,.2,1);}
@media(max-width:900px){.grid2,.oz2{grid-template-columns:1fr;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;}
body{background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
i.ic svg{display:block;}
.shell{display:flex;min-height:100vh;}
.side{width:260px;background:var(--card);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;box-shadow:0 2px 8px 0 rgba(47,43,61,.12);z-index:40;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.brand .lg{width:34px;height:34px;border-radius:8px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 3px 8px rgba(255,49,49,.35);}
.brand .nm{font-weight:800;font-size:13px;color:var(--head);}.brand .sb{font-size:9px;color:var(--muted);letter-spacing:1px;}
.wm{font-family:'Montserrat','Public Sans',sans-serif;font-weight:800;color:var(--head);letter-spacing:-.5px;line-height:1;font-size:20px;white-space:nowrap;}
.wm i{font-style:normal;color:var(--red);}
.wm-lg{font-size:34px;text-align:center;margin:4px 0 16px;}
.ngrp .gitems{overflow:hidden;max-height:800px;transition:max-height .3s cubic-bezier(.2,.8,.2,1);}
.ngrp.closed .gitems{max-height:0;}
.grp{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;}
.grp:hover{color:var(--head);opacity:1;}
.grp .garr{margin-left:auto;display:inline-flex;transition:transform .3s;}
.ngrp.closed .grp .garr{transform:rotate(-90deg);}
.nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:6px;font-size:13.5px;color:var(--head);font-weight:500;cursor:pointer;transition:.15s;min-height:38px;}
.ni:hover{background:var(--bg);color:var(--head);}
.ni.on{background:linear-gradient(270deg,rgba(255,49,49,.7) 0%,#FF3131 100%);color:#fff;box-shadow:0 2px 6px 0 rgba(255,49,49,.3);}
.ni.on:hover{color:#fff;}
.ni .bd{margin-left:auto;font-size:10px;font-weight:800;border-radius:10px;padding:1px 7px;}
.who{border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--head);}
.av{width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:12px;margin:12px 24px 0;background:var(--card);border:0;border-radius:8px;box-shadow:0 0 10px var(--line);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;z-index:5;}
.topbar .h{font-size:19px;font-weight:800;color:var(--head);}.topbar .s{font-size:12px;color:var(--muted);margin-top:2px;}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
.iconbtn:hover{background:var(--bg);box-shadow:var(--shadow-sm);}
.view{padding:22px 24px 90px;max-width:1140px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--card);border:0;border-radius:6px;padding:15px 16px;box-shadow:var(--shadow);transition:.18s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(47,43,61,.16);}
.kpi.alert{border:1px solid #f5c2c7;background:#fdf3f4;}
.kpi .t{font-size:10px;color:var(--muted);letter-spacing:.4px;display:flex;align-items:center;gap:6px;text-transform:uppercase;font-weight:700;}
.kpi .v{font-size:21px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;color:var(--head);}.kpi .x{font-size:10px;color:var(--muted);margin-top:3px;}
.sec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;margin:24px 0 10px;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.box{background:var(--card);border:0;border-radius:6px;overflow:hidden;box-shadow:var(--shadow);}
.row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink);}.row:last-child{border-bottom:none;}
.row:hover{background:var(--bg);}
.row.hd{background:var(--card2);font-size:10px;color:var(--muted);letter-spacing:.5px;font-weight:700;padding:10px 16px;text-transform:uppercase;}
.row.hd:hover{background:var(--card2);}
.grow{flex:1;min-width:0;}.nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mono{font-variant-numeric:tabular-nums;}
.btn{border:none;border-radius:6px;padding:7px 12px;font-weight:700;font-size:11.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s;}
.b-on{background:rgba(40,199,111,.14);color:#28C76F;}.b-on:hover{background:#28C76F;color:#fff;}
.b-no{background:rgba(234,84,85,.14);color:#EA5455;}.b-no:hover{background:#EA5455;color:#fff;}
.b-w{background:rgba(59,130,246,.14);color:#3B82F6;}.b-w:hover{background:#3B82F6;color:#fff;}
.pill{font-size:9.5px;font-weight:800;border-radius:20px;padding:3px 9px;white-space:nowrap;}
.p-o{background:rgba(255,159,67,.16);color:#E07B00;}.p-r{background:rgba(234,84,85,.16);color:#EA5455;}.p-b{background:rgba(59,130,246,.16);color:#3B82F6;}.p-g{background:rgba(40,199,111,.16);color:#1A9E55;}.p-m{background:rgba(255,49,49,.16);color:#FF3131;}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px;}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 14px;color:var(--ink);font-size:14px;outline:none;transition:.15s;}
.search:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.sel{background:var(--card);border:1px solid var(--line);border-radius:6px;color:var(--ink);font-size:12px;padding:6px 8px;outline:none;}
.bottomnav{display:none;}
/* ===== VUEXY MENГң: daralt (icon rayДұ) + hover'da geniЕҹle + pin ===== */
.brand .bwrap{min-width:0;}
.wm.wmini{display:none;font-size:22px;margin:0 auto;}
.mpin{margin-left:auto;width:20px;height:20px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.mpin i{width:8px;height:8px;border-radius:50%;background:var(--red);transition:transform .2s;}
.shell.mcol .mpin i{transform:scale(0);}
.side{transition:width .3s cubic-bezier(.2,.8,.2,1),margin-right .3s cubic-bezier(.2,.8,.2,1),padding .3s cubic-bezier(.2,.8,.2,1),background .25s;}
@media(min-width:860px){
  .shell.mcol .side{width:70px;padding:18px 9px;}
  .shell.mcol .side:hover{width:260px;padding:18px 14px;margin-right:-190px;box-shadow:0 5px 30px rgba(47,43,61,.24);}
  .shell.mcol .side:not(:hover) .ni{justify-content:center;padding:10px 0;gap:0;}
  .shell.mcol .side:not(:hover) .ni span{display:none;}
  .shell.mcol .side:not(:hover) .ni.sub,.shell.mcol .side:not(:hover) .lzsub{display:none;}
  .shell.mcol .side:not(:hover) .grp{justify-content:center;padding:13px 0 5px;}
  .shell.mcol .side:not(:hover) .grp .gtx,.shell.mcol .side:not(:hover) .grp .garr{display:none;}
  .shell.mcol .side:not(:hover) .grp::before{content:"";width:16px;height:1px;background:var(--line);}
  .shell.mcol .side:not(:hover) .brand{justify-content:center;}
  .shell.mcol .side:not(:hover) .brand .bwrap{display:none;}
  .shell.mcol .side:not(:hover) .wm.wmini{display:block;}
  .shell.mcol .side:not(:hover) .who{justify-content:center;}
  .shell.mcol .side:not(:hover) .who>div:not(.av){display:none;}
}
.ni.sub{padding:8px 13px 8px 37px;position:relative;font-size:12.5px;min-height:34px;}
.ni.sub::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.45;position:absolute;left:17px;top:50%;transform:translateY(-50%);}
.lzsub{overflow:hidden;animation:vap .25s;}
/* ===== Earning Reports kartДұ (Tahsilat Raporu) ===== */
.erc{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:20px 22px;display:flex;flex-direction:column;}
.erc .ct{font-size:15px;font-weight:800;color:var(--head);}
.erc .cs{font-size:12px;color:var(--muted);margin-top:2px;}
.erc-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 4px;}
.erc-tab{border:1px dashed var(--line);border-radius:10px;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:.15s;background:transparent;}
.erc-tab:hover{border-color:var(--muted);}
.erc-tab.on{border:1.5px solid var(--red);}
.erc-tab .tic{width:38px;height:38px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;}
.erc-tab.on .tic{background:var(--red-soft);}
.erc-tab .tl{font-size:12px;font-weight:700;color:var(--head);white-space:nowrap;}
.erc-bars{display:flex;align-items:flex-end;gap:10px;height:172px;padding:24px 2px 0;flex:1;}
.erc-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:7px;min-width:0;}
.erc-val{font-size:10.5px;font-weight:800;color:var(--head);white-space:nowrap;}
.erc-col.on .erc-val{color:var(--red);}
.erc-bar{display:block;width:min(30px,72%);border-radius:20px;background:var(--red-soft);}
.erc-col.on .erc-bar{background:var(--red);}
.erc-ay{font-size:10.5px;color:var(--muted);font-weight:600;}
/* dil menГјsГј */
.langdd{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);min-width:150px;padding:6px;z-index:60;}
.ldi{padding:9px 12px;border-radius:6px;font-size:13px;color:var(--head);cursor:pointer;font-weight:600;}
.ldi:hover{background:var(--bg);}
.ldi.on{background:var(--red-soft);color:var(--red);}
/* login */
.login{max-width:400px;margin:48px auto;padding:36px 30px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);}
.login .lg{width:54px;height:54px;border-radius:14px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;margin:0 auto 16px;box-shadow:0 4px 12px rgba(255,49,49,.35);}
.loginlogo{display:block;width:220px;max-width:76%;height:auto;margin:4px auto 18px;}
.lt{text-align:center;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:24px;}
.lbl{display:block;font-size:11px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
.field{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:var(--ink);font-size:15px;outline:none;transition:.15s;}
.field:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:14px;margin-top:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(255,49,49,.3);transition:.15s;}
.btnred:hover{box-shadow:0 6px 18px rgba(255,49,49,.45);}.btnred:disabled{opacity:.6;cursor:default;box-shadow:none;}
.rememberbox{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:14px;}
.lerr{color:#EA5455;font-size:12.5px;text-align:center;margin-top:12px;min-height:16px;}
/* overlay form */
.ovl{position:fixed;inset:0;background:rgba(34,41,47,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:22px 20px 28px;box-shadow:0 -8px 40px rgba(34,41,47,.2);}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}.mh .t{font-size:16px;font-weight:800;color:var(--head);}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#5E5873;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:80;box-shadow:0 8px 24px rgba(34,41,47,.3);}
@media(min-width:760px){ .modal{border-radius:16px;align-self:center;} .ovl{align-items:center;} }
@media(max-width:859px){
  .side{display:none;} .bottomnav{display:flex;} .content{padding-bottom:0;}
  .tsearch,.fx{display:none;}
  .view{padding:16px 14px 86px;} .topbar{padding:11px 14px;margin:10px 12px 0;top:8px;}
  .kpis{grid-template-columns:1fr 1fr;}
  .bottomnav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--card);border-top:1px solid var(--line);justify-content:flex-start;align-items:center;padding-bottom:6px;z-index:20;overflow-x:auto;box-shadow:0 -2px 12px rgba(34,41,47,.08);}
  .bottomnav::-webkit-scrollbar{display:none;}
  .bn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-weight:600;cursor:pointer;flex:0 0 auto;min-width:64px;padding:0 4px;}.bn.on{color:var(--red);}
  .row{flex-wrap:wrap;}
}
/* ===== V76 В· VUEXY Г–ZET GГ–RГңNГңMГң ===== */
.topbar{margin:14px 24px 0;border-radius:12px;box-shadow:var(--shadow);border-bottom:none;background:var(--card);backdrop-filter:none;}
.ozg{display:grid;gap:18px;}
.ozg.top{grid-template-columns:1.55fr 1fr 1fr;}
.ozg.kpi4{grid-template-columns:repeat(4,1fr);margin-top:18px;}
@media(max-width:1150px){.ozg.top{grid-template-columns:1fr;}.ozg.kpi4{grid-template-columns:1fr 1fr;}}
.ozc{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:20px 22px;}
.ozc .ct{font-size:15px;font-weight:800;color:var(--head);}
.ozc .cs{font-size:12px;color:var(--muted);margin-top:2px;}
.ozc .ico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ozc .big{font-size:24px;font-weight:800;color:var(--head);margin-top:12px;letter-spacing:-.5px;}
.ozc .bd{font-size:12px;font-weight:700;color:#28C76F;margin-top:4px;}
.ozc .bd.dn{color:#EA5455;}
.ozhero{background:linear-gradient(118deg,#FF3131 0%,#b5162c 100%);color:#fff;border-radius:12px;padding:22px 24px;position:relative;overflow:hidden;box-shadow:0 6px 22px -6px rgba(255,49,49,.5);}
.ozhero::after{content:"";position:absolute;right:-40px;top:-40px;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.06);}
.ozhero::before{content:"";position:absolute;right:40px;bottom:-60px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05);}
.ozhero .ht{font-size:17px;font-weight:800;}
.ozhero .hs{font-size:12px;opacity:.85;margin:2px 0 16px;}
.ozhero .hr{font-size:12px;opacity:.85;font-weight:600;margin-bottom:16px;}
.ozhero .hr b{font-size:15px;}
.ozhs{display:grid;grid-template-columns:1fr 1fr;gap:14px 10px;position:relative;z-index:1;}
.ozhs .b{display:flex;align-items:center;gap:9px;}
.ozhs .hic{width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ozhs .v{font-weight:800;font-size:15px;}
.ozhs .l{font-size:10.5px;opacity:.82;}
.ozsplit{height:8px;border-radius:6px;background:rgba(234,84,85,.14);overflow:hidden;margin-top:16px;}
.ozsplit i{display:block;height:100%;background:#28C76F;}
.ozleg{display:flex;gap:18px;margin-top:12px;font-size:12px;color:var(--muted);}

function agingBars(a){

window.aiPdfToFotos=function(dataUrl){
  var ai=aiInit(); if(ai.pdfBusy)return; ai.pdfBusy=true; toast("PDF sayfalarДұ gГ¶rsele Г§evriliyorвҖҰ");
  aiLoadPdfJs(function(err){
    if(err){ ai.pdfBusy=false; toast("PDF gГ¶rselleri Г§ДұkarДұlamadДұ (internet gerekli)"); return; }
    try{
      var b64=(dataUrl.split(',')[1]||""); var raw=atob(b64); var arr=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
        var n=Math.min(pdf.numPages,15); if(!n){ ai.pdfBusy=false; return; } var done=0, added=0;
        var step=function(){ done++; if(done>=n){ ai.pdfBusy=false; toast(added?(added+" sayfa eklendi вҖ” kullanacaДҹДұnДұ iЕҹaretle вң“"):"PDF'ten gГ¶rsel Г§ДұkmadДұ"); render(); } };
        for(var pg=1; pg<=n; pg++){ (function(pg){
          pdf.getPage(pg).then(function(page){
            var vp=page.getViewport({scale:1}); var sc=Math.min(2.4, 1600/Math.max(vp.width,vp.height)); var v=page.getViewport({scale:sc});
            var cv=document.createElement('canvas'); cv.width=Math.round(v.width); cv.height=Math.round(v.height);

          }).catch(step);
        })(pg); }
      }).catch(function(){ ai.pdfBusy=false; toast("PDF aГ§ДұlamadДұ"); });
    }catch(e){ ai.pdfBusy=false; toast("PDF iЕҹlenemedi"); }
  });
};

function aiTrimWhite(){

function langApply(root){
  if(S.lang!=="zh"||!root)return;
  if(root.nodeType===3){const k=root.nodeValue.trim();if(k&&ZH[k]!=null)root.nodeValue=root.nodeValue.replace(k,ZH[k]);return;}
  if(root.nodeType!==1)return;
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  const nodes=[]; while(w.nextNode())nodes.push(w.currentNode);
  nodes.forEach(n=>{
    const k=n.nodeValue.trim(); if(!k)return;
    const pe=n.parentElement;
    if(pe&&pe.classList&&pe.classList.contains("erc-ay")){ if(ZH_AY[k])n.nodeValue=ZH_AY[k]; return; }
    if(ZH[k]!=null)n.nodeValue=n.nodeValue.replace(k,ZH[k]);
  });
  if(root.querySelectorAll)root.querySelectorAll("input[placeholder],textarea[placeholder]").forEach(i=>{const k=i.placeholder.trim();if(ZH[k])i.placeholder=ZH[k];});
}

function cekCalendar(){const d=S.data||{};const cek=(d.cekler||[]).filter(c=>c.vade);const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();const first=new Date(yr,mo,1);const start=(first.getDay()+6)%7;const dim=new Date(yr,mo+1,0).getDate();const byDay={};cek.forEach(c=>{const dt=pdate(c.vade);if(dt&&dt.getFullYear()===yr&&dt.getMonth()===mo){(byDay[dt.getDate()]=byDay[dt.getDate()]||[]).push(c);}});const days=["Pzt","Sal","ГҮar","Per","Cum","Cmt","Paz"];let cells=days.map(x=>'<div class="cald">'+x+'</div>').join('');for(let i=0;i<start;i++)cells+='<div class="cell mut"></div>';for(let day=1;day<=dim;day++){const list=byDay[day]||[];const today=(day===now.getDate());const tot=list.reduce((a,c)=>a+(c.usd||0),0);cells+='<div class="cell'+(today?' today':'')+'">'+day+(list.length?'<div class="cdue '+(today?'p-r':'p-b')+'" title="'+esc(list.map(c=>c.musteri).join(", "))+'">'+(list.length>1?list.length+' Г§ek':kshort(tot))+'</div>':'')+'</div>';}const mon=["Ocak","Еһubat","Mart","Nisan","MayДұs","Haziran","Temmuz","AДҹustos","EylГјl","Ekim","KasДұm","AralДұk"][mo];const cnt=cek.filter(c=>{const dt=pdate(c.vade);return dt&&dt.getFullYear()===yr&&dt.getMonth()===mo;}).length;return '<div class="sec">'+ic('cal',13)+mon+' '+yr+' В· '+cnt+' Г§ek vadesi</div><div class="box" style="padding:16px;"><div class="cal">'+cells+'</div></div>';}
